<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакти | МійПроєкт</title>
  <link rel="stylesheet" href="../styles/style.css">
  <script src="../js/main.js" type="module" defer></script>
</head>
<body>

<header class="site-header">
  <div class="container header-flex">
    <div class="logo">MyProject</div>
    <div class="header-controls">
      <button id="theme-toggle" class="btn-ui">Змінити тему 🌙</button>
      <button id="menu-btn" class="menu-toggle" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav id="nav-menu">
      <ul class="nav-list">
        <li><a href="../index.html">Головна</a></li>
        <li><a href="about.html">Про мене</a></li>
        <li><a href="contact.html">Контакти</a></li>
        <li><a href="catalog.html">Каталог</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="container">
  <section class="section">
    <div class="contact-card card form-card">
      <h2>Зворотний зв'язок</h2>
      <p>Заповніть форму нижче, і ваше повідомлення буде оброблено за допомогою JavaScript.</p>

      <div id="form-message" class="status-msg" hidden></div>

      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Ваше ім'я</label>
          <input type="text" id="name" name="name" placeholder="Іван Іванов" required>
        </div>

        <div class="form-group">
          <label for="email">Ваш Email</label>
          <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
          <label for="subject">Тема звернення</label>
          <select id="subject" name="subject">
            <option value="general">Загальне питання</option>
            <option value="support">Технічна підтримка</option>
            <option value="collaboration">Співпраця</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Повідомлення</label>
          <textarea id="message" name="message" rows="6" placeholder="Введіть текст..." maxlength="500" required></textarea>
          <div class="char-counter">Символів: <span id="char-current">0</span> / 500</div>
        </div>

        <div class="form-group checkbox-group">
          <input type="checkbox" id="subscribe" name="subscribe">
          <label for="subscribe">Підписатися на розсилку</label>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">Відправити</button>
      </form>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 Всі права захищені</p>
  </div>
</footer>

<button id="back-to-top" title="Нагору" hidden>↑</button>

</body>
</html>
